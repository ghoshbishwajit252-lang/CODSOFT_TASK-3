<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rock · Paper · Scissors · P2P</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(145deg, #0b1a2e, #1a2f3f);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 1.5rem;
    }
    .game-container {
      background: rgba(22, 40, 56, 0.75);
      backdrop-filter: blur(6px);
      border-radius: 3.5rem;
      padding: 2.5rem 2.8rem;
      max-width: 850px;
      width: 100%;
      box-shadow: 0 25px 50px -8px rgba(0,0,0,0.8);
      border: 1px solid rgba(255,255,255,0.04);
    }
    h1 {
      text-align: center;
      color: #d6e6f5;
      font-weight: 500;
      letter-spacing: 3px;
      font-size: 2.5rem;
      margin-bottom: 1.2rem;
      text-shadow: 0 4px 12px rgba(0,0,0,0.6);
    }
    .mode-toggle {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .mode-btn {
      background: #1b3343;
      border: 2px solid #3f637a;
      padding: 0.6rem 1.8rem;
      border-radius: 60px;
      color: #e3f0fa;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      margin: 0 0.5rem;
    }
    .mode-btn.active {
      background: #2a5770;
      border-color: #78aac9;
      box-shadow: 0 0 20px rgba(120, 170, 201, 0.3);
    }
    .mode-btn:hover {
      background: #264a5e;
      border-color: #5d88a3;
    }
    .scoreboard {
      display: flex;
      justify-content: space-between;
      background: #0e1f2b;
      padding: 0.9rem 2rem;
      border-radius: 60px;
      margin-bottom: 2rem;
      color: #cbdde9;
      border: 1px solid #2d4a5b;
      font-weight: 500;
      font-size: 1.2rem;
    }
    .score-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .score-badge {
      background: #1d3a4b;
      padding: 0.2rem 1rem;
      border-radius: 40px;
      color: #b3d6ee;
      font-weight: 600;
      min-width: 2.8rem;
      text-align: center;
    }
    .player-indicator {
      text-align: center;
      font-size: 1.4rem;
      color: #b3d6ee;
      padding: 0.5rem;
      background: #0e1f2b;
      border-radius: 40px;
      margin-bottom: 1.2rem;
      border: 2px solid #2d4a5b;
    }
    .choice-area {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.2rem;
      margin: 1.5rem 0 2rem;
    }
    .choice-btn {
      background: #1b3343;
      border: none;
      padding: 0.9rem 1.8rem;
      border-radius: 60px;
      font-size: 1.4rem;
      font-weight: 600;
      color: #e3f0fa;
      box-shadow: 0 8px 0 #0a1924;
      cursor: pointer;
      transition: all 0.08s ease-in;
      border: 1px solid #3f637a;
      flex: 0 1 auto;
    }
    .choice-btn:active {
      transform: translateY(6px);
      box-shadow: 0 2px 0 #0a1924;
    }
    .choice-btn:hover {
      background: #264a5e;
      border-color: #5d88a3;
      color: white;
    }
    .choice-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: translateY(4px);
      box-shadow: 0 4px 0 #0a1924;
    }
    .round-display {
      background: #122b38;
      border-radius: 40px;
      padding: 1.6rem 1.8rem;
      margin: 1.5rem 0;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-around;
      align-items: center;
      gap: 0.8rem 1.5rem;
      border: 1px solid #2d556b;
    }
    .pick-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
    }
    .pick-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #8bb2cb;
    }
    .pick-value {
      background: #06212e;
      padding: 0.5rem 2rem;
      border-radius: 60px;
      font-size: 1.8rem;
      font-weight: 600;
      color: #ddf0ff;
      min-width: 110px;
      text-align: center;
      border: 1px solid #38728b;
    }
    .vs-badge {
      font-size: 1.8rem;
      font-weight: 300;
      color: #709bb3;
      letter-spacing: 3px;
    }
    .result-message {
      text-align: center;
      font-size: 1.8rem;
      font-weight: 600;
      padding: 0.7rem 1rem;
      border-radius: 60px;
      background: #0d2533;
      color: #d6ecfa;
      border-left: 6px solid #3d89b0;
      margin: 1.5rem 0;
    }
    .result-message.win { border-left-color: #3ed68b; color: #b0f0d0; }
    .result-message.lose { border-left-color: #e4686b; color: #fcc9ca; }
    .result-message.tie { border-left-color: #d4b87a; color: #f0e2b0; }
    .play-again-area {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-top: 1.5rem;
      flex-wrap: wrap;
    }
    .action-btn {
      background: #1e3f4f;
      border: 1px solid #4f7f99;
      padding: 0.9rem 2.5rem;
      border-radius: 60px;
      font-size: 1.2rem;
      font-weight: 600;
      color: #e3f0fa;
      box-shadow: 0 6px 0 #0b202b;
      cursor: pointer;
      transition: all 0.08s ease-in;
    }
    .action-btn:active {
      transform: translateY(6px);
      box-shadow: 0 1px 0 #0b202b;
    }
    .action-btn:hover {
      background: #2a5770;
      border-color: #78aac9;
    }
    .footer-note {
      text-align: center;
      color: #5b7e92;
      margin-top: 1.8rem;
      font-size: 0.9rem;
      border-top: 1px solid #264657;
      padding-top: 1.5rem;
    }
    @media (max-width: 550px) {
      .game-container { padding: 1.8rem 1.2rem; }
      h1 { font-size: 2rem; }
      .choice-btn { font-size: 1.2rem; padding: 0.7rem 1.2rem; }
      .pick-value { font-size: 1.4rem; min-width: 80px; }
    }
  </style>
</head>
<body>
<div class="game-container">
  <h1>✧ ROCK · PAPER · SCISSORS ✧</h1>

  <div class="mode-toggle">
    <button class="mode-btn active" data-mode="pve">🤖 vs Computer</button>
    <button class="mode-btn" data-mode="pvp">👥 Player vs Player</button>
  </div>

  <div class="scoreboard">
    <div class="score-item" id="p1ScoreLabel">👤 P1 <span class="score-badge" id="p1Score">0</span></div>
    <div class="score-item" id="p2ScoreLabel">👤 P2 <span class="score-badge" id="p2Score">0</span></div>
    <div class="score-item">🏳️ Ties <span class="score-badge" id="tiesScore">0</span></div>
  </div>

  <div class="player-indicator" id="turnIndicator">🎯 Player 1's turn</div>

  <div class="choice-area" id="choiceArea">
    <button class="choice-btn" data-move="rock">🪨 Rock</button>
    <button class="choice-btn" data-move="paper">📄 Paper</button>
    <button class="choice-btn" data-move="scissors">✂️ Scissors</button>
  </div>

  <div class="round-display">
    <div class="pick-box">
      <span class="pick-label" id="p1Label">Player 1</span>
      <span class="pick-value" id="p1Pick">—</span>
    </div>
    <span class="vs-badge">⚔️</span>
    <div class="pick-box">
      <span class="pick-label" id="p2Label">Player 2 / CPU</span>
      <span class="pick-value" id="p2Pick">—</span>
    </div>
  </div>

  <div class="result-message" id="resultMessage">👉 Choose your move</div>

  <div class="play-again-area">
    <button class="action-btn" id="resetBtn">🔄 New Game</button>
    <button class="action-btn" id="clearBtn">🗑️ Clear Round</button>
  </div>
  <div class="footer-note">⬆️ click your move · PvP: players take turns</div>
</div>

<script>
  (function() {
    // DOM refs
    const p1ScoreSpan = document.getElementById('p1Score');
    const p2ScoreSpan = document.getElementById('p2Score');
    const tiesScoreSpan = document.getElementById('tiesScore');
    const p1Pick = document.getElementById('p1Pick');
    const p2Pick = document.getElementById('p2Pick');
    const resultMessage = document.getElementById('resultMessage');
    const turnIndicator = document.getElementById('turnIndicator');
    const choiceBtns = document.querySelectorAll('.choice-btn');
    const resetBtn = document.getElementById('resetBtn');
    const clearBtn = document.getElementById('clearBtn');
    const modeBtns = document.querySelectorAll('.mode-btn');
    const p1Label = document.getElementById('p1Label');
    const p2Label = document.getElementById('p2Label');
    const p1ScoreLabel = document.getElementById('p1ScoreLabel');
    const p2ScoreLabel = document.getElementById('p2ScoreLabel');

    // State
    let mode = 'pve'; // 'pve' or 'pvp'
    let p1Score = 0, p2Score = 0, ties = 0;
    let p1Move = null, p2Move = null;
    let currentPlayer = 1; // 1 or 2
    let roundComplete = false;

    // Move map
    const moveMap = { rock: '🪨 Rock', paper: '📄 Paper', scissors: '✂️ Scissors' };

    function updateUI() {
      p1ScoreSpan.textContent = p1Score;
      p2ScoreSpan.textContent = p2Score;
      tiesScoreSpan.textContent = ties;
      p1Pick.textContent = p1Move ? moveMap[p1Move] : '—';
      p2Pick.textContent = p2Move ? moveMap[p2Move] : '—';
      
      // Update labels
      if (mode === 'pve') {
        p1Label.textContent = '👤 You';
        p2Label.textContent = '🤖 Computer';
        p1ScoreLabel.innerHTML = '🧑 You <span class="score-badge" id="p1Score">' + p1Score + '</span>';
        p2ScoreLabel.innerHTML = '🤖 Computer <span class="score-badge" id="p2Score">' + p2Score + '</span>';
      } else {
        p1Label.textContent = '👤 Player 1';
        p2Label.textContent = '👤 Player 2';
        p1ScoreLabel.innerHTML = '👤 P1 <span class="score-badge" id="p1Score">' + p1Score + '</span>';
        p2ScoreLabel.innerHTML = '👤 P2 <span class="score-badge" id="p2Score">' + p2Score + '</span>';
      }

      // Update turn indicator
      if (mode === 'pvp' && !roundComplete) {
        turnIndicator.textContent = `🎯 Player ${currentPlayer}'s turn`;
        turnIndicator.style.display = 'block';
      } else if (mode === 'pvp' && roundComplete) {
        turnIndicator.textContent = '✅ Round complete! Click Clear or New Game';
        turnIndicator.style.display = 'block';
      } else if (mode === 'pve') {
        turnIndicator.textContent = '🎯 Click your move';
        turnIndicator.style.display = 'block';
      }

      // Enable/disable buttons based on state
      choiceBtns.forEach(btn => {
        btn.disabled = (mode === 'pvp' && roundComplete);
      });
    }

    function getResult(m1, m2) {
      if (!m1 || !m2) return null;
      if (m1 === m2) return 'tie';
      if (
        (m1 === 'rock' && m2 === 'scissors') ||
        (m1 === 'scissors' && m2 === 'paper') ||
        (m1 === 'paper' && m2 === 'rock')
      ) {
        return 'win';
      }
      return 'lose';
    }

    function setResultMessage(result, m1, m2) {
      resultMessage.classList.remove('win', 'lose', 'tie');
      if (!m1 || !m2) {
        resultMessage.textContent = '👉 Make your move';
        return;
      }
      const names = mode === 'pve' ? ['You', 'Computer'] : ['Player 1', 'Player 2'];
      const cap = (s) => s.charAt(0).toUpperCase() + s.slice(1);
      if (result === 'win') {
        resultMessage.textContent = `🎉 ${names[0]} wins! ${cap(m1)} beats ${cap(m2)}.`;
        resultMessage.classList.add('win');
      } else if (result === 'lose') {
        resultMessage.textContent = `😔 ${names[1]} wins! ${cap(m2)} beats ${cap(m1)}.`;
        resultMessage.classList.add('lose');
      } else if (result === 'tie') {
        resultMessage.textContent = `🤝 It's a tie! Both chose ${cap(m1)}.`;
        resultMessage.classList.add('tie');
      }
    }

    function completeRound() {
      if (!p1Move || !p2Move) return;
      const result = getResult(p1Move, p2Move);
      if (result === 'win') p1Score++;
      else if (result === 'lose') p2Score++;
      else ties++;
      setResultMessage(result, p1Move, p2Move);
      roundComplete = true;
      updateUI();
    }

    function handlePVEMove(move) {
      if (roundComplete) return;
      const computerMove = ['rock', 'paper', 'scissors'][Math.floor(Math.random() * 3)];
      p1Move = move;
      p2Move = computerMove;
      completeRound();
    }

    function handlePVPMove(move) {
      if (roundComplete) return;
      if (currentPlayer === 1) {
        p1Move = move;
        currentPlayer = 2;
        p1Pick.textContent = moveMap[move];
        turnIndicator.textContent = '🎯 Player 2\'s turn';
        // Disable buttons briefly? No, just let P2 choose
      } else {
        p2Move = move;
        p2Pick.textContent = moveMap[move];
        completeRound();
        currentPlayer = 1; // reset for next round
      }
      updateUI();
    }

    function handleMove(move) {
      if (mode === 'pve') {
        handlePVEMove(move);
      } else {
        handlePVPMove(move);
      }
    }

    function resetGame() {
      p1Score = 0;
      p2Score = 0;
      ties = 0;
      p1Move = null;
      p2Move = null;
      roundComplete = false;
      currentPlayer = 1;
      resultMessage.classList.remove('win', 'lose', 'tie');
      resultMessage.textContent = '👉 New game! Make your move';
      updateUI();
    }

    function clearRound() {
      p1Move = null;
      p2Move = null;
      roundComplete = false;
      if (mode === 'pvp') currentPlayer = 1;
      resultMessage.classList.remove('win', 'lose', 'tie');
      resultMessage.textContent = '👉 Choose your move';
      updateUI();
    }

    function setMode(newMode) {
      mode = newMode;
      modeBtns.forEach(btn => {
        btn.classList.toggle('active', btn.dataset.mode === mode);
      });
      resetGame();
    }

    // Event listeners
    choiceBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        const move = btn.dataset.move;
        if (move) handleMove(move);
      });
    });

    resetBtn.addEventListener('click', resetGame);
    clearBtn.addEventListener('click', clearRound);

    modeBtns.forEach(btn => {
      btn.addEventListener('click', () => setMode(btn.dataset.mode));
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      const key = e.key;
      let move = null;
      if (key === '1' || key === '!') move = 'rock';
      else if (key === '2' || key === '@') move = 'paper';
      else if (key === '3' || key === '#') move = 'scissors';
      if (move) {
        e.preventDefault();
        handleMove(move);
      }
      if (key === 'r' || key === 'R') resetGame();
      if (key === 'c' || key === 'C') clearRound();
    });

    // Init
    setMode('pve');
  })();
</script>
</body>
</html>
